<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Directed edges (arrows) forming a preference graph -->
  <line x1="16" y1="16" x2="46" y2="16" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="18" x2="48" y2="44" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="48" x2="18" y2="48" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="46" x2="46" y2="18" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,3"/>
  <!-- Arrowheads -->
  <polygon points="48,16 43,13 43,19" fill="url(#g)"/>
  <polygon points="48,46 51,41 45,41" fill="url(#g)"/>
  <polygon points="16,48 21,51 21,45" fill="url(#g)"/>
  <!-- Nodes -->
  <circle cx="16" cy="16" r="5" fill="url(#g)"/>
  <circle cx="48" cy="16" r="5" fill="url(#g)"/>
  <circle cx="48" cy="48" r="5" fill="url(#g)"/>
  <circle cx="16" cy="48" r="5" fill="url(#g)"/>
</svg>
