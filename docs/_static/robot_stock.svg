<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Robot Illustration</title>
  <desc id="desc">Simple robot head illustration for LLM benchmarks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- antenna -->
  <rect x="316" y="58" width="8" height="32" rx="4" fill="#94a3b8"/>
  <circle cx="320" cy="50" r="8" fill="#38bdf8"/>

  <!-- head -->
  <rect x="200" y="90" width="240" height="160" rx="20" fill="url(#face)" stroke="#9ca3af" stroke-width="2"/>

  <!-- eyes -->
  <circle cx="260" cy="160" r="18" fill="#0ea5e9"/>
  <circle cx="380" cy="160" r="18" fill="#0ea5e9"/>
  <circle cx="260" cy="160" r="8" fill="#e0f2fe"/>
  <circle cx="380" cy="160" r="8" fill="#e0f2fe"/>

  <!-- mouth/speaker -->
  <rect x="260" y="200" width="120" height="24" rx="6" fill="#111827" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="272" y="206" width="12" height="12" rx="2" fill="#22d3ee"/>
  <rect x="292" y="206" width="12" height="12" rx="2" fill="#67e8f9"/>
  <rect x="312" y="206" width="12" height="12" rx="2" fill="#22d3ee"/>
  <rect x="332" y="206" width="12" height="12" rx="2" fill="#67e8f9"/>
  <rect x="352" y="206" width="12" height="12" rx="2" fill="#22d3ee"/>

  <!-- label -->
  <text x="320" y="300" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial" font-weight="700" text-anchor="middle" font-size="22">LLM Consistency</text>
</svg>

