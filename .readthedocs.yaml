version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  # Enforce clean builds on RTD as well
  fail_on_warning: true

python:
  install:
    # Install only doc/runtime deps to avoid compiling the Rust extension on RTD
    - requirements: docs/requirements.txt

formats:
  - htmlzip
